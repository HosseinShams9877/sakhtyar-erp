<!DOCTYPE html>
<html dir="rtl" lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>آفلاین - ERP مصالح عمرانی</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Tahoma,Arial,sans-serif;background:linear-gradient(135deg,#f8fafc,#e2e8f0);min-height:100vh;display:flex;align-items:center;justify-content:center;direction:rtl;color:#1e293b}
.container{text-align:center;padding:40px 20px;max-width:500px}
.icon{font-size:80px;margin-bottom:20px;animation:pulse 2s infinite}
h1{font-size:24px;color:#dc2626;margin-bottom:12px}
p{color:#64748b;font-size:16px;margin-bottom:24px;line-height:1.8}
.retry-btn{background:#2563eb;color:#fff;border:none;padding:12px 32px;border-radius:8px;font-size:16px;cursor:pointer;font-family:inherit}
.retry-btn:hover{background:#1d4ed8}
.status{margin-top:20px;display:flex;align-items:center;justify-content:center;gap:8px;color:#64748b;font-size:14px}
.dot{width:10px;height:10px;border-radius:50%;background:#ef4444;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@media(prefers-color-scheme:dark){body{background:linear-gradient(135deg,#0f172a,#1e293b)}h1{color:#f87171}p{color:#94a3b8}}
</style>
</head>
<body>
<div class="container">
<div class="icon">📡</div>
<h1>شما آفلاین هستید</h1>
<p>اتصال اینترنت شما قطع شده است. برخی قابلیت‌ها ممکن است محدود باشد. لطفاً اتصال خود را بررسی کنید.</p>
<button class="retry-btn" onclick="retryConnection()">تلاش مجدد</button>
<div class="status"><div class="dot"></div><span id="status-text">در انتظار اتصال...</span></div>
</div>
<script>
function retryConnection(){fetch('/api/health').then(r=>{if(r.ok)location.reload()}).catch(()=>document.getElementById('status-text').textContent='هنوز آفلاین هستید')}
setInterval(()=>{if(navigator.onLine)location.reload()},30000);
window.addEventListener('online',()=>location.reload());
</script>
</body>
</html>
